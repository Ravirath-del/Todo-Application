apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment 
spec:
  replicas: 5
  selector:
    matchLabels:
      app: todoui
  strategy: 
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: todoui
    spec:
      containers:
      - name: todoapp
        image: todoui:v2
        ports:
        - containerPort: 80
