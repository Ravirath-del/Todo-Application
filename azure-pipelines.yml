trigger:
 branches:
   include:
     - develop
pr:
 branches:
   include:
     - develop
pool: Application_agentpool
variables:
- group: variable group 20-Mar

stages:
- stage: test
  jobs:
  - job: BiomeLint
    continueOnError: true
    displayName: Biome lint(JS lint)
    steps:
    - task: PowerShell@2
      displayName: Biome chal gya paglu
      continueOnError: true
      inputs:
        targetType: 'inline'
        script: 'C:\Tools\biome.exe lint $(System.DefaultWorkingDirectory)/src'
    - task: PowerShell@2
      continueOnError: true
      displayName: sonarqube SAST
      inputs:
        targetType: 'inline'
        script: 'sonar -D sonar.host.url=http://localhost:9000 -D sonar.token=$(sonar_token) -D sonar.projectKey=Todo_application'
- stage: build
  jobs:
  - job: Artifactbuild
    steps:
    - task: NodeTool@0
      displayName: node tool install
      inputs:
        versionSource: 'spec'
        versionSpec: '18.x'
    - task: PowerShell@2
      displayName: download dependencies
      inputs:
        targetType: 'inline'
        script: 'npm install'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
    - task: PowerShell@2
      displayName: Build Artifact
      inputs:
        targetType: 'inline'
        script: 'npm run build'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'todo-build'
        publishLocation: 'Container'
        MaxArtifactSize: 0
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'todo-build'
        downloadPath: '$(System.ArtifactsDirectory)/Artifact'

    