trigger:
 branches:
   include:
     - develop
pr:
 branches:
   include:
     - develop
pool: Application_agentpool
variables:
- group: variable group 20-Mar

stages:
- stage: test
  jobs:
  - job: BiomeLint
    continueOnError: true
    displayName: Biome lint(JS lint)
    steps:
    - task: PowerShell@2
      continueOnError: true
      inputs:
        targetType: 'inline'
        script: 'C:\Tools\biome.exe lint $(System.DefaultWorkingDirectory)/src'
    - task: PowerShell@2
      continueOnError: true
      displayName: sonarqube SAST
      inputs:
        targetType: 'inline'
        script: 'sonar -D sonar.host.url=http://localhost:9000 -D sonar.token=$(sonar_token) -D sonar.projectKey=Todo_application'
- stage: build
  jobs:
  - job: Artifactbuild
    steps:
    - task: NodeTool@0
      inputs:
        versionSource: 'spec'
        versionSpec: '18.x'
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: 'npm install'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: 'npm run build'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
    