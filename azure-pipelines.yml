trigger:
 branches:
   include:
     - devlop
pr:
 branches:
   include:
     - devlop
pool: Application_agentpool
# variables:
# - group: variable group 20-Mar

stages:
- stage: dockerbuild
  jobs:
  - job: dockerimage
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: 'Azurecr registry'
        repository: 'todoui'
        command: 'buildAndPush'
        Dockerfile: '$(System.DefaultWorkingDirectory)/Dockerfile'
        tags: 'v4'
        arguments: '--platform linux/amd64,linux/arm64'
- stage:
  jobs:
  - job: k8sdeployment
    steps:
    - checkout: self
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "==== FILES ===="
          dir $(System.DefaultWorkingDirectory) -Recurse
    - task: Kubernetes@1
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: 'Azure subscription 1 (77f3ee6c-f543-47ec-ad10-67a999f49859)'
        azureResourceGroup: 'Ravi-RG'
        kubernetesCluster: 'my_aks'
        useClusterAdmin: true
        namespace: 'default'
        command: 'apply'
        useConfigurationFile: true
        configuration: |
          $(System.DefaultWorkingDirectory)/k8s/deployment.yml
